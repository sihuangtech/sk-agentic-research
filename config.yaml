# 所有运行产物都保存在本地工作区。
workspace_dir: data/workspace

research_directions:
  - Reinforcement Learning from Verifiable Rewards
  - LLM reasoning and tool use

llm:
  provider: openai
  model: gpt-4o-mini
  # 建议使用不同模型做假设评审，留空时与生成模型相同。
  reviewer_provider:
  reviewer_model:
  max_tokens: 6000

search:
  providers:
    - arxiv
    - semantic_scholar
  results_per_provider: 5
  request_timeout_seconds: 20

experiment:
  executor: local
  timeout_minutes: 30
  train_seeds: [11, 23, 37]
  # 留出种子不得与开发种子重叠。
  validation_seeds: [101, 211, 307]
  max_iterations: 2
  minimum_success_rate: 1.0
  maximum_coefficient_of_variation: 0.15

security:
  # 本地执行器无法提供容器级网络隔离；false 时会静态阻止常见网络模块。
  allow_network: false
  max_memory_mb: 4096
  max_output_kb: 1024
  blocked_modules: [subprocess, socket, httpx, requests, urllib]

workflow:
  max_concurrent_pipelines: 1
  max_ideas_per_cycle: 3
  hypothesis_review_threshold: 7.0
  daemon_interval_minutes: 60
  # 默认先审核实验计划，防止模型生成代码后立即执行。
  human_review_before_execution: true
